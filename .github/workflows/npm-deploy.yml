name: npm Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Validate published release
        id: release
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          release_tag="v${package_version}"

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::package.json version must look like 1.2.3 or 1.2.3-rc.1."
            exit 1
          fi

          if [ "${{ github.event.release.tag_name }}" != "${release_tag}" ]; then
            echo "::error::GitHub Release tag ${{ github.event.release.tag_name }} does not match package.json version ${package_version}."
            exit 1
          fi

          if [[ "${package_version}" == *-* ]]; then
            npm_tag="beta"
            prerelease="true"
          else
            npm_tag="latest"
            prerelease="false"
          fi

          if [ "${{ github.event.release.prerelease }}" != "${prerelease}" ]; then
            echo "::error::GitHub prerelease state does not match package version ${package_version}."
            exit 1
          fi

          echo "npm_tag=${npm_tag}" >> "${GITHUB_OUTPUT}"

      - name: Inspect package contents
        run: pnpm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --tag "${{ steps.release.outputs.npm_tag }}"
